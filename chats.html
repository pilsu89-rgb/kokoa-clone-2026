<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chats - Kakao Clone</title>
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <div class="app">
      <div class="status-bar">
        <div class="status-bar__column">
          <span>No Service</span>
          <span>⌁</span>
        </div>
        <div class="status-bar__column">21:23</div>
        <div class="status-bar__column">
          <span>◉</span>
          <span>100%</span>
          <span class="status-bar__battery"></span>
        </div>
      </div>

      <header class="screen-header">
        <h1 class="screen-header__title">Chats</h1>
        <div class="screen-header__icons" aria-label="Chat actions">
          <a href="find.html" aria-label="Search">⌕</a>
          <span aria-hidden="true">☏</span>
          <span aria-hidden="true">♫</span>
          <a href="settings.html" aria-label="Settings">⚙</a>
        </div>
      </header>

      <main class="main-screen chats-screen">
        <a
          class="user-component chat-preview"
          href="chat.html"
          aria-label="Open KakaoTalk chat"
        >
          <div class="user-component__column">
            <div class="kakao-logo" aria-hidden="true"></div>
            <div class="user-component__text">
              <h2 class="user-component__title">KakaoTalk</h2>
              <p class="user-component__subtitle">
                Please check My Kakao Account Info
              </p>
            </div>
          </div>
          <div class="user-component__meta" aria-label="Unread message and time">
            <div>
              <div class="chat-preview__time">21:22</div>
              <span class="badge">1</span>
            </div>
          </div>
        </a>
      </main>

      <nav class="nav" aria-label="Main navigation">
        <ul class="nav__list">
          <li>
            <a class="nav__link" href="friends.html" aria-label="Friends">♙</a>
          </li>
          <li>
            <a
              class="nav__link nav__link--active"
              href="chats.html"
              aria-label="Chats"
            >
              ●
              <span class="badge nav__notification">1</span>
            </a>
          </li>
          <li>
            <a class="nav__link" href="find.html" aria-label="Find">⌕</a>
          </li>
          <li>
            <a class="nav__link" href="more.html" aria-label="More">
              •••
              <span class="badge badge--tiny nav__dot"></span>
            </a>
          </li>
        </ul>
      </nav>
    </div>
  </body>
</html>
