<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Friends - Kakao Clone</title>
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <div class="app">
      <div class="status-bar">
        <div class="status-bar__column">
          <span>No Service</span>
          <span>⌁</span>
        </div>
        <div class="status-bar__column">21:23</div>
        <div class="status-bar__column">
          <span>◉</span>
          <span>100%</span>
          <span class="status-bar__battery"></span>
        </div>
      </div>

      <header class="screen-header">
        <h1 class="screen-header__title">Friends</h1>
        <div class="screen-header__icons" aria-label="Friends actions">
          <a href="find.html" aria-label="Search">⌕</a>
          <span aria-hidden="true">♫</span>
          <a href="settings.html" aria-label="Settings">⚙</a>
        </div>
      </header>

      <main class="main-screen friends-screen">
        <a class="friends-display-link" href="#">
          <span>ⓘ</span>
          <span>Friends' Names Display</span>
          <span>›</span>
        </a>

        <section class="user-component" aria-label="My profile">
          <div class="user-component__column">
            <div class="avatar" aria-hidden="true"></div>
            <div class="user-component__text">
              <h2 class="user-component__title">Pilsu Kim</h2>
            </div>
          </div>
        </section>

        <div class="friends-screen__channel-header">
          <span>Channel</span>
          <span>⌃</span>
        </div>

        <section
          class="user-component user-component--sm friends-screen__channel-row"
          aria-label="Channel"
        >
          <div class="user-component__column">
            <div class="channel-avatar" aria-hidden="true"></div>
            <div class="user-component__text">
              <h2 class="user-component__title">Channel</h2>
            </div>
          </div>
          <div class="user-component__meta">
            <span>2</span>
            <span>›</span>
          </div>
        </section>
      </main>

      <nav class="nav" aria-label="Main navigation">
        <ul class="nav__list">
          <li>
            <a
              class="nav__link nav__link--active"
              href="friends.html"
              aria-label="Friends"
              >♟</a
            >
          </li>
          <li>
            <a class="nav__link" href="chats.html" aria-label="Chats">
              ♡
              <span class="badge nav__notification">1</span>
            </a>
          </li>
          <li>
            <a class="nav__link" href="find.html" aria-label="Find">⌕</a>
          </li>
          <li>
            <a class="nav__link" href="more.html" aria-label="More">
              •••
              <span class="badge badge--tiny nav__dot"></span>
            </a>
          </li>
        </ul>
      </nav>
    </div>
  </body>
</html>
