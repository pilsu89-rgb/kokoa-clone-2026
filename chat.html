<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chat with Pilsu Kim</title>
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <div class="app app--chat">
      <div class="status-bar">
        <div class="status-bar__column">
          <span>No Service</span>
          <span>⌁</span>
        </div>
        <div class="status-bar__column">21:28</div>
        <div class="status-bar__column">
          <span>◉</span>
          <span>100%</span>
          <span class="status-bar__battery"></span>
        </div>
      </div>

      <header class="alt-header">
        <div class="alt-header__left">
          <a href="chats.html" aria-label="Back to chats">‹</a>
        </div>
        <h1 class="alt-header__title">Pilsu Kim</h1>
        <div class="alt-header__right">
          <a href="find.html" aria-label="Search">⌕</a>
          <span aria-hidden="true">☰</span>
        </div>
      </header>

      <main class="chat-screen">
        <div class="chat-date">Tuesday, June 30, 2020</div>

        <section class="message-row" aria-label="Message from Pilsu Kim">
          <div class="avatar avatar--xs" aria-hidden="true"></div>
          <div class="message-row__content">
            <span class="message-row__author">Pilsu Kim</span>
            <div class="message-row__info">
              <span class="message-row__bubble">Hi!</span>
              <span class="message-row__time">21:27</span>
            </div>
          </div>
        </section>

        <section class="message-row message-row--own" aria-label="My message">
          <div class="message-row__info">
            <span class="message-row__bubble">What’s up?</span>
            <span class="message-row__time">21:27</span>
          </div>
        </section>
      </main>

      <footer class="reply" aria-label="Reply and keyboard mockup">
        <div class="reply__bar">
          <span class="reply__add" aria-hidden="true">+</span>
          <div class="reply__input-wrap">
            <span>Hi!</span>
            <span class="reply__emoji">☺</span>
            <span class="reply__send">↑</span>
          </div>
        </div>

        <div class="keyboard" aria-hidden="true">
          <div class="keyboard__row">
            <span class="key">q</span>
            <span class="key">w</span>
            <span class="key">e</span>
            <span class="key">r</span>
            <span class="key">t</span>
            <span class="key">y</span>
            <span class="key">u</span>
            <span class="key">i</span>
            <span class="key">o</span>
            <span class="key">p</span>
          </div>
          <div class="keyboard__row">
            <span class="key">a</span>
            <span class="key">s</span>
            <span class="key">d</span>
            <span class="key">f</span>
            <span class="key">g</span>
            <span class="key">h</span>
            <span class="key">j</span>
            <span class="key">k</span>
            <span class="key">l</span>
          </div>
          <div class="keyboard__row">
            <span class="key key--gray">⇧</span>
            <span class="key">z</span>
            <span class="key">x</span>
            <span class="key">c</span>
            <span class="key">v</span>
            <span class="key">b</span>
            <span class="key">n</span>
            <span class="key">m</span>
            <span class="key key--gray">⌫</span>
          </div>
          <div class="keyboard__row">
            <span class="key key--gray key--wide">123</span>
            <span class="key key--gray">◎</span>
            <span class="key key--gray">♬</span>
            <span class="key key--space">space</span>
            <span class="key key--gray key--wide">return</span>
          </div>
        </div>
      </footer>
    </div>
  </body>
</html>
